# managed-by: repo-agent-bootstrap v1 — DO NOT EDIT directly; changes overwritten on regen. Remove this line to opt out of auto-management.
# Format reference for docs-manifest.yaml generated by the bootstrap agent.
# Top-level metadata + audiences + a per-doc list grouped by section.

project:
  name: {{REPO_NAME}}
  repo: {{REPO_URL}}
  description: {{REPO_ONE_LINER}}
  deployment_context: {{DEPLOYMENT_TARGET}}

# Conventional landing pages by audience. If a page doesn't exist, omit the key
# (do not fabricate paths).
audiences:
  developer: site/content/developer/quickstart.md
  operator:  site/content/operator/getting-started.md
  architect: site/content/architecture/_index.md

# Optional top-level shortcuts.
concepts: site/content/concepts.md
services: site/content/architecture/service-architecture.md

# Per-doc status index. Status: current | stale | draft.
# - current: authoritative; verified against code recently
# - stale:   exists but may be out of date; treat as advisory
# - draft:   under construction; do not rely on
docs:
  - path: site/content/_index.md
    title: <title from frontmatter or H1>
    status: stale
    last_updated: <YYYY-MM-DD or "unknown">

  - path: site/content/concepts.md
    title: Concepts
    status: stale
    last_updated: <YYYY-MM-DD>

  - path: site/content/architecture/_index.md
    title: Architecture
    status: stale
    last_updated: <YYYY-MM-DD>

  # Repeat for every discovered doc file.

# Optional: cross-cutting indices.
operations:
  troubleshooting: site/content/operator/troubleshooting.md
  runbooks: site/content/operator/runbooks.md

diagrams:
  - site/static/diagrams/context.svg
  - site/static/diagrams/deployment.svg
